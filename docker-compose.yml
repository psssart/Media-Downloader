services:
  media-downloader:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev-stage
    container_name: media-downloader-dev
    ports:
      - "5000:8000"
    volumes:
      - ./backend:/app
      - ./downloads:/app/downloads
      - ./cookies:/app/cookies
    environment:
      - MD_DEBUG=true
      - MD_FILE_RETENTION_HOURS=0.5
      - MD_CLEANUP_INTERVAL_MINUTES=10
      - PYTHONUNBUFFERED=1
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload